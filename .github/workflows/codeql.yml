name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 3 * * 1"

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    env:
      # Disable overlay mode — cached base database references the old repo
      # name (hyrda) which breaks the pre-finalize working directory.
      CODEQL_ACTION_DISABLE_OVERLAY: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete old CodeQL databases
        run: rm -rf /home/runner/work/_temp/codeql_databases

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
