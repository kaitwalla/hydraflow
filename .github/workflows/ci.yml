name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format . --check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Pyright
        run: uv run pyright

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Bandit security scan
        run: uv run bandit -c pyproject.toml -r . --severity-level medium

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Warning gate (targeted)
        run: PYTHONPATH=src uv run pytest tests/test_execution.py tests/test_agent.py tests/test_hitl_runner.py tests/test_prompt_telemetry.py tests/test_dashboard_routes.py -W error::RuntimeWarning -W error::pytest.PytestUnraisableExceptionWarning
      - name: Run tests with coverage
        run: PYTHONPATH=src uv run pytest tests/ --cov=src --cov-fail-under=70 --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install Python dependencies
        run: uv sync --all-extras
      - name: Install UI dependencies
        working-directory: src/ui
        run: npm ci
      - name: Run smoke tests
        run: make smoke

  ui-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install dependencies
        working-directory: src/ui
        run: npm ci
      - name: Build
        working-directory: src/ui
        run: npm run build
      - name: Test
        working-directory: src/ui
        run: npm test

  visual-capture:
    name: Visual Capture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install dependencies
        working-directory: src/ui
        run: npm ci
      - name: Install Playwright browsers
        working-directory: src/ui
        run: npx playwright install --with-deps chromium
      - name: Generate baseline screenshots
        working-directory: src/ui
        run: npm run screenshot:update
      - name: Verify reproducibility (second run must match)
        working-directory: src/ui
        run: npm run screenshot
      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-captures
          path: src/ui/e2e/screenshots/
          retention-days: 30
